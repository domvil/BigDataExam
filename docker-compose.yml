services:
  ais-collision:
    build: .
    volumes:
      - ./Data:/workspace/Data:ro
      - ./output:/workspace/output
    command:
      [
        "python",
        "-m",
        "ais_collision.batch",
        "--input-glob",
        "/workspace/Data/aisdk-2021-12-*.csv",
        "--output-dir",
        "/workspace/output/full-month",
        "--driver-memory",
        "8g",
        "--master",
        "local[4]",
        "--shuffle-partitions",
        "200"
      ]